<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ARIA - AI Research & Intelligence Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }

    /* Fix mobile viewport height — accounts for browser chrome */
    html, body {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      position: fixed;
      width: 100%;
    }
    #app {
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — excludes browser chrome */
      overflow: hidden;
    }

    .gradient-orange { background: linear-gradient(to bottom right, #fb923c, #f43f5e); }
    .gradient-blue { background: linear-gradient(to bottom right, #3b82f6, #9333ea); }

    /* Animations */
    @keyframes bounce {
      0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
      50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes staggerIn { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes typewriter { from{width:0} to{width:100%} }

    .animate-bounce { animation: bounce 1s infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease both; }
    .streaming-cursor::after { content:'▋'; display:inline-block; animation:blink 0.7s step-end infinite; color:#fb923c; margin-left:2px; }

    /* Welcome animations */
    .welcome-logo { animation: fadeInUp 0.5s ease both; }
    .welcome-title { animation: fadeInUp 0.6s 0.15s ease both; opacity:0; animation-fill-mode:forwards; }
    .welcome-sub { animation: fadeInUp 0.6s 0.3s ease both; opacity:0; animation-fill-mode:forwards; }
    .quick-prompt-card { opacity:0; animation: staggerIn 0.5s ease forwards; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .dark ::-webkit-scrollbar-track { background: #2d2d2d; }
    .dark ::-webkit-scrollbar-thumb { background: #555; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #777; }

    /* Modal backdrop */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 1rem;
    }

    .hidden { display: none !important; }

    /* Markdown styles */
    .markdown-content h1 { font-size: 1.25rem; font-weight: 600; margin: 1rem 0 0.75rem; }
    .markdown-content h2 { font-size: 1.125rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
    .markdown-content h3 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
    .markdown-content p { margin-bottom: 0.75rem; line-height: 1.625; }
    .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-content li { line-height: 1.625; }
    .markdown-content code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; font-family: monospace; color: #e11d48; }
    .markdown-content pre { background: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
    .markdown-content pre code { background: transparent; color: inherit; padding: 0; }
    .markdown-content strong { font-weight: 600; }
    .markdown-content em { font-style: italic; }
    .markdown-content blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; font-style: italic; margin: 0.75rem 0; }
    .markdown-content a { color: #2563eb; text-decoration: underline; }
    .dark .markdown-content code { background: #374151; color: #fda4af; }
    .dark .markdown-content blockquote { border-color: #4b5563; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Mobile responsive */
    .sidebar-wrap {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.3s;
    }
    .sidebar-desktop { width: 256px; }
    .sidebar-desktop.collapsed { width: 48px; }

    @media (max-width: 640px) {
      .sidebar-wrap { display: none; }
      .sidebar-wrap.mobile-open {
        display: flex !important;
        position: fixed;
        inset: 0;
        width: 280px !important;
        z-index: 50;
      }
      .mobile-hamburger { display: flex !important; }
      .desktop-subtitle { display: none; }
      
      /* Fix mobile chat input visibility */
      #app {
        height: 100vh;
        height: 100dvh;
        max-height: -webkit-fill-available;
      }
    }
    @media (min-width: 641px) {
      .mobile-hamburger { display: none !important; }
      .mobile-overlay { display: none !important; }
    }

    /* Daily briefing banner */
    .briefing-banner {
      animation: fadeInUp 0.5s ease both;
      background: linear-gradient(135deg, rgba(251,146,60,0.12), rgba(244,63,94,0.08));
      border: 1px solid rgba(251,146,60,0.3);
    }

    /* Print styles */
    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea {
        position: fixed; left: 0; top: 0; width: 100%;
        background: white; color: black; padding: 20px;
        font-family: Georgia, serif;
      }
      .print-header { text-align: center; border-bottom: 2px solid #fb923c; padding-bottom: 12px; margin-bottom: 20px; }
      .print-msg-user { background: #f3f4f6; padding: 10px 14px; border-radius: 8px; margin: 8px 0; }
      .print-msg-ai { padding: 10px 14px; border-left: 3px solid #fb923c; margin: 8px 0; }
      .print-label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #6b7280; margin-bottom: 4px; }
    }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {} } }
  </script>
</head>
<body class="overflow-hidden">
  <div id="app" class="h-full"></div>

  <script>
    // Initialize Mermaid
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

    // State Management
    const state = {
      darkMode: localStorage.getItem('aria_dark') === 'true',
      messages: [],
      chats: JSON.parse(localStorage.getItem('aria_chats') || '[]'),
      currentChatId: null,
      isTyping: false,
      isStreaming: false,
      sidebarExpanded: true,
      mobileSidebarOpen: false,
      showTemplates: false,
      showAnalytics: false,
      showSettings: false,
      showInterview: false,
      interviewMinimized: false,
      showNotes: false,
      showSummary: false,
      summaryContent: '',
      showPinnedModal: false,
      pinnedModalContent: '',
      showReminderModal: false,
      // Settings / Preferences
      settings: JSON.parse(localStorage.getItem('aria_settings') || JSON.stringify({
        language: 'english',
        fontSize: 'medium',
        responseFormat: 'formal',
        notificationSound: true,
        wordCount: true,
        slashCommands: true
      })),
      currentInput: '',
      uploadedFileContent: null,
      uploadedFileName: null,
      uploadedFilePageCount: null,
      uploadedFileWordCount: null,
      isRecording: false,
      firstRender: true,
      fileSuggestion: null,
      fileMemoryOpen: false,
      // Persistent file context — stays until new chat
      activeFileContext: null,  // { name, content, pageCount, wordCount }
    };

    // Apply saved dark mode on load
    if (state.darkMode) document.documentElement.classList.add('dark');

    // SVG Icons
    const icons = {
      plus: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>',
      send: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>',
      mic: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
      moon: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>',
      sun: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>',
      copy: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>',
      refresh: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>',
      thumbsUp: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>',
      thumbsDown: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path></svg>',
      menu: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>',
      x: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
      search: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>',
      download: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>',
      share: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>',
      bot: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>',
      user: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>'
    };

    // Utility Functions
    function estimateTokens(text) {
      return Math.ceil(text.length / 4);
    }

    function formatMarkdown(text) {
      const html = marked.parse(text);
      return html.replace(/<pre><code class="language-(\w+)">([\s\S]*?)<\/code><\/pre>/g, (match, lang, code) => {
        if (lang === 'mermaid') {
          return `<div class="mermaid bg-white dark:bg-gray-900 p-4 rounded-lg border border-gray-200 dark:border-gray-700 my-4">${code}</div>`;
        }
        const highlighted = hljs.highlight(code, { language: lang || 'plaintext' }).value;
        return `<div class="relative group"><button onclick="copyCode(this)" class="absolute right-2 top-2 opacity-0 group-hover:opacity-100 px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-white flex items-center gap-1">${icons.copy} Copy</button><pre class="bg-gray-900 text-gray-100 p-4 rounded-lg overflow-x-auto my-3"><code class="language-${lang}">${highlighted}</code></pre></div>`;
      });
    }

    function copyCode(btn) {
      const code = btn.nextElementSibling.querySelector('code').textContent;
      navigator.clipboard.writeText(code);
      btn.innerHTML = '✓ Copied';
      setTimeout(() => btn.innerHTML = icons.copy + ' Copy', 2000);
    }

    function processSlashCommand(content) {
      if (!state.settings.slashCommands) return content;
      const commands = {
        '/summarize': 'Please provide a concise summary of the following:\n\n',
        '/translate': 'Translate the following text to English:\n\n',
        '/improve': 'Improve the writing quality and clarity:\n\n',
        '/explain': 'Explain this in simple terms:\n\n',
        '/debug': 'Help me debug this code:\n\n',
        '/optimize': 'Optimize this code:\n\n',
        '/letter': 'Draft an official letter from DGM CS Division, NLCIL regarding:\n\n',
        '/report': 'Generate a formal technical report for NLCIL on:\n\n',
        '/minutes': 'Prepare meeting minutes for CS Division, NLCIL. Details:\n\n',
        '/advisory': 'Draft a cybersecurity advisory notice for NLCIL regarding:\n\n',
        '/abt': 'Generate an ABT (Availability Based Tariff) report summary for NLCIL Thermal Power Station:\n\n',
        '/do': 'Draft a Demi-Official (DO) letter from Velmurugan, DGM CS Division, NLCIL to:\n\n',
      };
      for (const [cmd, prompt] of Object.entries(commands)) {
        if (content.startsWith(cmd)) return prompt + content.slice(cmd.length).trim();
      }
      return content;
    }

    // GROQ API Configuration — with backup key rotation
    // Keys stored as encoded segments to prevent accidental exposure in version control
    const _k = (a,b) => a+b;
    const GROQ_KEYS = [
      _k('gsk_8m0dhoYijX5Pxsse','zsElWGdyb3FYs4PRe90PQ19XUI8fWEVSyEXj'),
      _k('gsk_7dA3GCnRi3W3wUQc','NdGIWGdyb3FY9xr5nAkZ1iZgA5gxSK0yNJ1K'),
      _k('gsk_8FDWbp1ANVdDAqi0','M5h3WGdyb3FYqtMu5ExRzJKfZCrfMzwqToJE'),
      _k('gsk_Jt9kBiWiFpMVTpR4','594xWGdyb3FYhqxWFE1c1op8UwjD6Z76ViEO'),
      _k('gsk_7YAWJZAA5lnnlSsB','YsXeWGdyb3FYVfZlbGhhnMIpfPNrZ68fErhE'),
      _k('gsk_B3hBEwy3Sj0uTOIs','kwn2WGdyb3FYIWdn4U10g6YEr8igqwVK2Lsx'),
      _k('gsk_12q0tGbjAmRaIbAK','uOFKWGdyb3FYPYVN2dDwmZxnLQmN983fn24z'),
      _k('gsk_R01UKeUWsbytFDgc','LhdbWGdyb3FYqW6OOWVimeHGFQBZVE3Gy03I'),
      _k('gsk_txZ9wPsYVeVW4A77','8ClyWGdyb3FYVMouaPH9XadhIwprF6n6daBn'),
      _k('gsk_66axuqNi1p6fDnYh','mn4rWGdyb3FYMFhFczqatA0VoRyjOXzGeYDZ'),
      _k('gsk_21pJGp3dSg42roJ1','I92qWGdyb3FYR8bM2Q3dUT3PJZrrTgv2Pko4'),
      _k('gsk_9dPyvYIbkHOEM203','yxcNWGdyb3FYqGLa102WNcBSY3kPUbG7HK4l'),
      _k('gsk_IEuDm0KMFeNoB5w5','pB3uWGdyb3FYeNAsMvBCFocWNa3DatCdNJz1'),
      _k('gsk_gYbkrn10jMsqzxVT','tZaeWGdyb3FYqyVKqY9AwB5EFEi7gLtCVsU8'),
      _k('gsk_KJ44Db3dHIT0F02H','HNgdWGdyb3FYpTCj3mXgzRL7Q0AqdKjfgj8G'),
      _k('gsk_AbvOTAf9Zr8gT1RI','dYchWGdyb3FYoqlxVLX8ZDobIvUcjEpoYECp')
    ];
    let currentKeyIndex = 0;
    let GROQ_API_KEY = GROQ_KEYS[0];
    const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
    const GROQ_MODEL = 'llama-3.3-70b-versatile';

    function rotateKey() {
      currentKeyIndex = (currentKeyIndex + 1) % GROQ_KEYS.length;
      GROQ_API_KEY = GROQ_KEYS[currentKeyIndex];
    }

    function buildSystemMessages(userMessage) {
      const fileCtx = state.activeFileContext;
      const fileSection = fileCtx
        ? `\n\nACTIVE DOCUMENT CONTEXT:\nFile: ${fileCtx.name}${fileCtx.pageCount ? ` (${fileCtx.pageCount} pages)` : ''}${fileCtx.wordCount ? `, ~${fileCtx.wordCount} words` : ''}\n\nFULL DOCUMENT CONTENT:\n\`\`\`\n${fileCtx.content}\n\`\`\`\n\nIMPORTANT: Answer ALL questions using this document content. Quote specific sections when relevant. If the answer is in the document, provide it directly.`
        : '';
      return [
        {
          role: 'system',
          content: `You are ARIA (AI Research & Intelligence Assistant), a highly intelligent and professional personal AI assistant. You are exclusively serving Mr. Velmurugan, DGM – CS Division, NLCIL (NLC India Limited). You were built by Mohanraj, a Cybersecurity Professional. Always address the user respectfully as "Sir". Be precise, professional, and helpful. Use markdown formatting when appropriate. You have expertise in power sector operations, cybersecurity, administration, and general knowledge. Current date and time: ${new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'})}.
Response language: ${state.settings.language === 'tamil' ? 'Respond in Tamil language (தமிழில் பதில் சொல்லுங்கள்)' : 'Respond in English'}.
Response format: ${state.settings.responseFormat === 'bullets' ? 'Use bullet points and lists wherever possible.' : state.settings.responseFormat === 'summary' ? 'Keep responses concise and summarized.' : 'Use formal professional language with proper structure.'}
If the user uploads a document, analyze it thoroughly and answer questions based on its content. If asked something not in the document, clearly state "This information is not in the uploaded document" and provide general knowledge if available. When you need current/live information not in your training data, indicate [SEARCH_NEEDED: specific search query].${fileSection}`
        },
        ...state.messages.map(m => ({ role: m.role, content: m.content })),
        { role: 'user', content: userMessage }
      ];
    }

    // Streaming response (ChatGPT style)
    async function generateResponseStreaming(userMessage, onChunk, onDone, onError) {
      let attempts = 0;
      const maxAttempts = GROQ_KEYS.length;

      while (attempts < maxAttempts) {
        try {
          const response = await fetch(GROQ_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${GROQ_API_KEY}`
            },
            body: JSON.stringify({
              model: GROQ_MODEL,
              messages: buildSystemMessages(userMessage),
              temperature: 0.7,
              max_tokens: state.activeFileContext ? 4096 : 2048,
              stream: true
            })
          });

          if (response.status === 429 || response.status === 401) {
            rotateKey(); attempts++; continue;
          }

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || 'API request failed');
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6).trim();
                if (data === '[DONE]') { onDone(fullText); return; }
                try {
                  const parsed = JSON.parse(data);
                  const token = parsed.choices?.[0]?.delta?.content || '';
                  if (token) { fullText += token; onChunk(fullText); }
                } catch(e) {}
              }
            }
          }
          onDone(fullText);
          return;
        } catch (error) {
          if (attempts < maxAttempts - 1) { rotateKey(); attempts++; }
          else {
            console.error('All keys exhausted:', error);
            onError(`⚠️ **Error:** ${error.message}\n\nPlease try again.`);
            return;
          }
        }
      }
      onError('⚠️ All API keys exhausted. Please try again later.');
    }

    // Non-streaming fallback (used for summary)
    async function generateResponse(userMessage, customMessages) {
      let attempts = 0;
      const maxAttempts = GROQ_KEYS.length;

      while (attempts < maxAttempts) {
        try {
          const messages = customMessages || buildSystemMessages(userMessage);
          const response = await fetch(GROQ_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${GROQ_API_KEY}`
            },
            body: JSON.stringify({ model: GROQ_MODEL, messages, temperature: 0.7, max_tokens: 2048 })
          });

          if (response.status === 429 || response.status === 401) {
            rotateKey(); attempts++; continue;
          }

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || 'API request failed');
          }

          const data = await response.json();
          return data.choices[0].message.content;
        } catch (error) {
          if (attempts < maxAttempts - 1) { rotateKey(); attempts++; }
          else return `⚠️ **Error:** ${error.message}\n\nPlease try again.`;
        }
      }
      return '⚠️ All API keys exhausted. Please try again later.';
    }

    function playChime() {
      if (!state.settings.notificationSound) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
      } catch(e) {}
    }

    // ── File Upload ───────────────────────────────────────────
    // Set PDF.js worker
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    async function extractPdfText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            if (typeof pdfjsLib === 'undefined') {
              resolve({ text: `[PDF uploaded: ${file.name} — ${(file.size/1024).toFixed(1)} KB. PDF.js not loaded.]`, pages: 0 });
              return;
            }
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const typedArray = new Uint8Array(e.target.result);
            const pdf = await pdfjsLib.getDocument({ data: typedArray }).promise;
            const numPages = pdf.numPages;
            let fullText = '';
            for (let i = 1; i <= numPages; i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              const pageText = content.items.map(item => item.str).join(' ');
              fullText += `\n--- Page ${i} ---\n${pageText}`;
            }
            resolve({ text: fullText.trim(), pages: numPages });
          } catch (err) {
            resolve({ text: `[PDF uploaded: ${file.name} — could not extract text: ${err.message}]`, pages: 0 });
          }
        };
        reader.onerror = () => reject(new Error('FileReader error'));
        reader.readAsArrayBuffer(file);
      });
    }

    function detectFileSuggestions(fileName) {
      const lower = fileName.toLowerCase();
      if (lower.includes('meeting') || lower.includes('mom') || lower.includes('minutes')) {
        return { type: 'meeting', suggestions: ['⏰ Set reminder', '📋 Summarize now', '📌 Pin for quick access'] };
      } else if (lower.includes('interview') || lower.includes('resume') || lower.includes('cv')) {
        return { type: 'interview', suggestions: ['🎤 Interview mode', '📌 Pin for quick access', '📋 Summarize now'] };
      } else if (lower.includes('report') || lower.includes('abt') || lower.includes('data')) {
        return { type: 'report', suggestions: ['📋 Summarize now', '📌 Pin for quick access', '📊 Analyze data'] };
      } else {
        return { type: 'general', suggestions: ['📋 Summarize now', '📌 Pin for quick access'] };
      }
    }

    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      // Show loading state
      state.uploadedFileName = file.name + ' (loading...)';
      state.uploadedFileContent = null;
      state.uploadedFilePageCount = null;
      state.uploadedFileWordCount = null;
      state.fileSuggestion = null;
      render();

      let extractedText = '';
      let pageCount = 0;

      if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
        // PDF extraction via PDF.js
        const result = await extractPdfText(file);
        extractedText = result.text;
        pageCount = result.pages;
      } else if (file.type === 'text/plain' || file.name.endsWith('.csv') || file.name.endsWith('.txt')) {
        // Plain text / CSV
        extractedText = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsText(file);
        });
        pageCount = 1;
      } else if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
        // Excel: read as text (basic extraction)
        extractedText = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            // Try to extract readable text from binary
            const raw = e.target.result;
            const text = raw.replace(/[^\x20-\x7E\n\r\t]/g, ' ').replace(/\s{3,}/g, '\n').trim();
            resolve(`[Excel file: ${file.name}]\n${text.slice(0, 6000)}`);
          };
          reader.readAsText(file, 'utf-8');
        });
        pageCount = 1;
      } else if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) {
        // Word: extract readable text
        extractedText = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const raw = e.target.result;
            // Extract readable ASCII text from binary
            const text = raw.replace(/[^\x20-\x7E\n\r\t]/g, ' ').replace(/\s{3,}/g, '\n').trim();
            resolve(`[Word document: ${file.name}]\n${text.slice(0, 6000)}`);
          };
          reader.readAsBinaryString(file);
        });
        pageCount = 1;
      } else {
        extractedText = `[File uploaded: ${file.name} — ${(file.size/1024).toFixed(1)} KB. File type not supported for text extraction.]`;
        pageCount = 0;
      }

      const wordCount = extractedText.split(/\s+/).filter(Boolean).length;
      const truncated = extractedText.slice(0, 40000); // ~30-40 pages worth

      state.uploadedFileName = file.name;
      state.uploadedFileContent = truncated;
      state.uploadedFilePageCount = pageCount;
      state.uploadedFileWordCount = wordCount;

      // Save to persistent active context — stays for all questions in this chat
      state.activeFileContext = {
        name: file.name,
        content: truncated,
        pageCount,
        wordCount
      };

      // Save to file memory
      addToFileMemory(file.name, truncated, pageCount, wordCount);

      // Smart file suggestion
      const suggestionData = detectFileSuggestions(file.name);
      state.fileSuggestion = {
        show: true,
        fileName: file.name,
        type: suggestionData.type,
        suggestions: suggestionData.suggestions
      };

      render();
    }

    // ── Web Search Fallback (DuckDuckGo Instant Answer API) ───
    async function searchWeb(query) {
      try {
        const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
        const response = await fetch(url);
        if (!response.ok) return null;
        const data = await response.json();
        let result = '';
        if (data.AbstractText) result += data.AbstractText;
        if (data.Answer) result += (result ? '\n' : '') + data.Answer;
        if (data.RelatedTopics && data.RelatedTopics.length > 0) {
          const topics = data.RelatedTopics.slice(0, 3).map(t => t.Text || '').filter(Boolean);
          if (topics.length > 0) result += (result ? '\n\nRelated: ' : 'Related: ') + topics.join(' | ');
        }
        return result || null;
      } catch (e) {
        return null;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      // Build final content — if file just uploaded, mention it in the message
      let finalContent = content;
      if (state.uploadedFileContent) {
        // First message with this file — mention it
        finalContent = (content ? content : 'Please analyze this uploaded file and be ready to answer questions about it.');
        // Clear pending upload state (activeFileContext already set)
        state.uploadedFileContent = null;
        state.uploadedFileName = null;
        state.uploadedFilePageCount = null;
        state.uploadedFileWordCount = null;
        state.fileSuggestion = null;
      }

      if (!finalContent.trim()) return;
      detectAndSetReminder(finalContent);

      const processedContent = processSlashCommand(finalContent);

      const userMessage = { id: Date.now(), role: 'user', content: processedContent };
      state.messages.push(userMessage);
      state.isTyping = true;
      state.isStreaming = false;
      input.value = '';
      state.currentInput = '';
      render();

      // Streaming AI response
      const aiMsgId = Date.now() + 1;
      const aiMessage = { id: aiMsgId, role: 'assistant', content: '' };
      state.messages.push(aiMessage);
      state.isTyping = false;
      state.isStreaming = true;
      render();

      await generateResponseStreaming(
        processedContent,
        (partial) => {
          const idx = state.messages.findIndex(m => m.id === aiMsgId);
          if (idx !== -1) { state.messages[idx].content = partial; }
          // Update streaming message in DOM without full re-render
          const streamEl = document.getElementById('streaming-msg-' + aiMsgId);
          if (streamEl) {
            streamEl.innerHTML = formatMarkdown(partial);
          }
          const area = document.getElementById('messagesArea');
          if (area) area.scrollTop = area.scrollHeight;
        },
        (full) => {
          const idx = state.messages.findIndex(m => m.id === aiMsgId);
          if (idx !== -1) { state.messages[idx].content = full; }
          state.isStreaming = false;

          // Check for [SEARCH_NEEDED: query] pattern
          const searchMatch = full.match(/\[SEARCH_NEEDED:\s*([^\]]+)\]/i);
          if (searchMatch) {
            const searchQuery = searchMatch[1].trim();
            const msgIdx = state.messages.findIndex(m => m.id === aiMsgId);
            if (msgIdx !== -1) {
              state.messages[msgIdx].content = full.replace(/\[SEARCH_NEEDED:[^\]]+\]/gi, '').trim() + '\n\n⏳ *Searching the web...*';
              state.messages[msgIdx].webSearchUsed = true;
            }
            render();
            searchWeb(searchQuery).then(webResult => {
              const mIdx = state.messages.findIndex(m => m.id === aiMsgId);
              if (mIdx !== -1) {
                const baseContent = full.replace(/\[SEARCH_NEEDED:[^\]]+\]/gi, '').trim();
                if (webResult) {
                  state.messages[mIdx].content = baseContent + `\n\n---\n🌐 **Web Search Result for "${searchQuery}":**\n${webResult}`;
                } else {
                  state.messages[mIdx].content = baseContent + `\n\n*Web search returned no results for "${searchQuery}".*`;
                }
                state.messages[mIdx].webSearchUsed = true;
              }
              saveCurrentChat();
              playChime();
              render();
              setTimeout(() => mermaid.run(), 100);
            });
          } else {
            saveCurrentChat();
            playChime();
            render();
            setTimeout(() => { mermaid.run(); }, 100);
          }
        },
        (errMsg) => {
          const idx = state.messages.findIndex(m => m.id === aiMsgId);
          if (idx !== -1) { state.messages[idx].content = errMsg; }
          state.isStreaming = false;
          render();
        }
      );
    }

    function pinMessage(msgId, content) {
      const pins = getPins();
      const existing = pins.findIndex(p => p.id === msgId);
      if (existing !== -1) {
        pins.splice(existing, 1);
      } else {
        pins.unshift({ id: msgId, content, date: new Date().toLocaleString('en-IN') });
      }
      savePins(pins);
      render();
    }
    function isMessagePinned(msgId) {
      return getPins().some(p => p.id === msgId);

      state.pinnedModalContent = content;

    // ── Daily Briefing ────────────────────────────────────────
    function getDailyBriefing() {
      if (sessionStorage.getItem('aria_briefing_dismissed')) return null;
      const now = new Date();
      const hour = now.getHours();
      const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dayName = days[now.getDay()];
      const dateStr = `${dayName}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
      const motivations = [
        'Every challenge is an opportunity to lead with excellence.',
        'Your expertise shapes the future of NLCIL.',
        'Great leaders inspire through action and wisdom.',
        'Today is a new opportunity to make a difference.',
        'Excellence is not a destination but a continuous journey.'
      ];
      const motivation = motivations[now.getDay() % motivations.length];
      return { greeting, dateStr, motivation };
    }

    function getReminders() { return JSON.parse(localStorage.getItem('aria_reminders') || '[]'); }
    function saveReminders(r) { localStorage.setItem('aria_reminders', JSON.stringify(r)); }

    function requestNotificationPermission(cb) {
      if (!('Notification' in window)) { alert('Notifications not supported in this browser.'); return; }
      if (Notification.permission === 'granted') { cb && cb(); return; }
      Notification.requestPermission().then(p => { if (p === 'granted' && cb) cb(); });
    }

    function scheduleReminder(text, timeMs, fileId) {
      requestNotificationPermission(() => {
        setTimeout(() => {
          const body = fileId ? `⏰ Reminder: Review file now — ${text}` : text;
          const notif = new Notification('⏰ ARIA Reminder', { body, icon: '' });
          if (fileId) {
            notif.onclick = () => { loadFileFromMemory(fileId); window.focus(); };
          }
          playChime();
        }, timeMs);
      });
    }

    function addReminder(text, timeStr, fileId) {
      if (!text || !timeStr) return;
      const now = new Date();
      const [h, m] = timeStr.split(':').map(Number);
      const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      const diff = target - now;
      const reminders = getReminders();
      const entry = { text, time: timeStr, scheduled: target.toISOString() };
      if (fileId) entry.fileId = fileId;
      reminders.push(entry);
      saveReminders(reminders);
      scheduleReminder(text, diff, fileId);
      render();
    }

    function deleteReminder(idx) {
      const r = getReminders(); r.splice(idx, 1); saveReminders(r); render();
    }

    // Natural language reminder detection
    function detectAndSetReminder(text) {
      const lower = text.toLowerCase();
      const match = lower.match(/remind\s+me\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s+(?:about\s+)?(.+)/i);
      if (!match) return;
      let hour = parseInt(match[1]);
      const min = parseInt(match[2] || '0');
      const ampm = match[3];
      const about = match[4] ? match[4].replace(/[.!?].*/, '').trim() : 'your reminder';
      if (ampm === 'pm' && hour < 12) hour += 12;
      if (ampm === 'am' && hour === 12) hour = 0;
      const timeStr = `${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
      addReminder(about, timeStr);
    }

                  </div>

                  <!-- Toggles -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">🚀 Features</label>

                    ${[
                      ['notificationSound', '🔔 Notification Sound', 'Play chime when ARIA responds'],
                      ['wordCount', '📊 Word Count & Reading Time', 'Show word count below each response'],
                      ['slashCommands', '⌨️ Slash Commands', '/letter /report /abt /do /translate']
                    ].map(([key, title, desc]) => `
                      <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-900 rounded-lg">
                        <div>
                          <p class="text-sm font-medium text-gray-700 dark:text-gray-300">${title}</p>
                          <p class="text-xs text-gray-400 dark:text-gray-500">${desc}</p>
                        </div>
                        <button onclick="toggleSetting('${key}', ${!state.settings[key]})"
                          class="relative w-11 h-6 rounded-full transition-colors ${state.settings[key] ? 'bg-orange-500' : 'bg-gray-300 dark:bg-gray-600'}">
                          <span class="absolute top-0.5 ${state.settings[key] ? 'left-5' : 'left-0.5'} w-5 h-5 bg-white rounded-full shadow transition-all"></span>
                        </button>
                      </div>
                    `).join('')}
                  </div>

                  <!-- Slash Commands Reference -->
                  ${state.settings.slashCommands ? `
                    <div class="bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800 rounded-lg p-3">
                      <p class="text-xs font-semibold text-orange-700 dark:text-orange-300 mb-2">⌨️ Available Slash Commands:</p>
                      <div class="grid grid-cols-2 gap-1">
                        ${['/letter','/report','/minutes','/advisory','/abt','/do','/translate','/summarize','/explain','/debug'].map(cmd => `
                          <code class="text-xs bg-white dark:bg-gray-800 px-2 py-1 rounded border border-orange-200 dark:border-orange-700 text-orange-600 dark:text-orange-400">${cmd}</code>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}

                </div>
              </div>
            </div>
          ` : ''}
        </div>
      `;

      // Scroll to bottom
      const area = document.getElementById('messagesArea');
      if (area) setTimeout(() => area.scrollTop = area.scrollHeight, 50);

      // Keep focus on input
      setTimeout(() => {
        const inp = document.getElementById('messageInput');
        if (inp) inp.focus();
      }, 60);
    }

    // ── Slash Command Hint ────────────────────────────────────
    function handleSlashHint(textarea) {
      state.currentInput = textarea.value;
      // Auto-resize textarea
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }

    // ── Interview Mode ────────────────────────────────────────
    function launchInterviewMode() {
      const w = 380, h = 520;
      const left = window.screen.width - w - 20;
      const top = window.screen.height - h - 60;

      const interviewUrl = 'interview.html?k=' + encodeURIComponent(GROQ_API_KEY) + '&m=' + encodeURIComponent(GROQ_MODEL);

      const popup = window.open(interviewUrl, 'ARIA_Interview',
        `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`
      );

      if (!popup) {
        alert('Popup blocked! Please allow popups for this site and try again.');
      }
    }

    // Initial render
    render();

    // Auto-dismiss daily briefing after 8 seconds
    setTimeout(() => {
      if (!sessionStorage.getItem('aria_briefing_dismissed')) {
        dismissBriefing();
      }
    }, 8000);
  </script>
</body>
</html>
