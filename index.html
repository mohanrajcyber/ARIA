  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }

    /* Fix mobile viewport height — accounts for browser chrome */
    html, body {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      position: fixed;
      width: 100%;
    }
    #app {
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — excludes browser chrome */
      overflow: hidden;
    }

    .gradient-orange { background: linear-gradient(to bottom right, #fb923c, #f43f5e); }
    .gradient-blue { background: linear-gradient(to bottom right, #3b82f6, #9333ea); }

    /* Animations */
    @keyframes bounce {
      0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
      50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes staggerIn { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes typewriter { from{width:0} to{width:100%} }

    /* ✅ FEATURE 1: Enhanced Loading Animation */
    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #f3f4f6;
      border-radius: 18px;
    }
    .dark .typing-indicator {
      background: #374151;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fb923c;
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    .animate-bounce { animation: bounce 1s infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease both; }
    .streaming-cursor::after { content:'▋'; display:inline-block; animation:blink 0.7s step-end infinite; color:#fb923c; margin-left:2px; }

    /* Welcome animations */
    .welcome-container {
      background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
    }
    .dark .welcome-container {
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
    }
    .welcome-logo { animation: fadeInUp 0.5s ease both; }
    .welcome-title { animation: fadeInUp 0.6s 0.15s ease both; opacity:0; animation-fill-mode:forwards; color: #1f2937; }
    .dark .welcome-title { color: #f3f4f6; }
    .welcome-sub { animation: fadeInUp 0.6s 0.3s ease both; opacity:0; animation-fill-mode:forwards; color: #6b7280; }
    .dark .welcome-sub { color: #9ca3af; }
    .quick-prompt-card { opacity:0; animation: staggerIn 0.5s ease forwards; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .dark ::-webkit-scrollbar-track { background: #2d2d2d; }
    .dark ::-webkit-scrollbar-thumb { background: #555; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #777; }

    /* Modal backdrop */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 1rem;
    }

    .hidden { display: none !important; }

    /* Markdown styles */
    .markdown-content h1 { font-size: 1.25rem; font-weight: 600; margin: 1rem 0 0.75rem; }
    .markdown-content h2 { font-size: 1.125rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
    .markdown-content h3 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
    .markdown-content p { margin-bottom: 0.75rem; line-height: 1.625; }
    .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-content li { line-height: 1.625; }
    .markdown-content code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; font-family: monospace; color: #e11d48; }
    .markdown-content pre { background: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
    .markdown-content pre code { background: transparent; color: inherit; padding: 0; }
    .markdown-content strong { font-weight: 600; }
    .markdown-content em { font-style: italic; }
    .markdown-content blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; font-style: italic; margin: 0.75rem 0; }
    .markdown-content a { color: #2563eb; text-decoration: underline; }
    .dark .markdown-content code { background: #374151; color: #fda4af; }
    .dark .markdown-content blockquote { border-color: #4b5563; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Mobile responsive */
    .sidebar-wrap {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.3s;
    }
    .sidebar-desktop { width: 256px; }
    .sidebar-desktop.collapsed { width: 48px; }

    @media (max-width: 640px) {
      .sidebar-wrap { display: none; }
      .sidebar-wrap.mobile-open {
        display: flex !important;
        position: fixed;
        inset: 0;
        width: 280px !important;
        z-index: 50;
      }
      .mobile-hamburger { display: flex !important; }
      .desktop-subtitle { display: none; }
      
      /* Fix mobile chat input visibility */
      #app {
        height: 100vh;
        height: 100dvh;
        max-height: -webkit-fill-available;
      }
    }
    @media (min-width: 641px) {
      .mobile-hamburger { display: none !important; }
      .mobile-overlay { display: none !important; }
    }

    /* Daily briefing banner */
    .briefing-banner {
      animation: fadeInUp 0.5s ease both;
      background: linear-gradient(135deg, rgba(251,146,60,0.12), rgba(244,63,94,0.08));
      border: 1px solid rgba(251,146,60,0.3);
    }

    /* Print styles */
    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea {
        position: fixed; left: 0; top: 0; width: 100%;
        background: white; color: black; padding: 20px;
        font-family: Georgia, serif;
      }
      .print-header { text-align: center; border-bottom: 2px solid #fb923c; padding-bottom: 12px; margin-bottom: 20px; }
      .print-msg-user { background: #f3f4f6; padding: 10px 14px; border-radius: 8px; margin: 8px 0; }
      .print-msg-ai { padding: 10px 14px; border-left: 3px solid #fb923c; margin: 8px 0; }
      .print-label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #6b7280; margin-bottom: 4px; }
    }
  </style>

    tailwind.config = { darkMode: 'class', theme: { extend: {} } }

    function getTimeAgo(timestamp) {
      if (!timestamp) return '';
      const now = Date.now();
      const diff = now - timestamp;
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      
      if (seconds < 60) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      
      const date = new Date(timestamp);
      return date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
    }

    // Streaming response (ChatGPT style)
    async function generateResponseStreaming(userMessage, onChunk, onDone, onError) {
      let attempts = 0;
      const maxAttempts = GROQ_KEYS.length;

      while (attempts < maxAttempts) {
        try {
          const response = await fetch(GROQ_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${GROQ_API_KEY}`
            },
            body: JSON.stringify({
              model: GROQ_MODEL,
              messages: buildSystemMessages(userMessage),
              temperature: 0.7,
              max_tokens: state.activeFileContext ? 4096 : 2048,
              stream: true
            })
          });

          if (response.status === 429 || response.status === 401) {
            rotateKey(); attempts++; continue;
          }

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || 'API request failed');
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6).trim();
                if (data === '[DONE]') { onDone(fullText); return; }
                try {
                  const parsed = JSON.parse(data);
                  const token = parsed.choices?.[0]?.delta?.content || '';
                  if (token) { fullText += token; onChunk(fullText); }
                } catch(e) {}
              }
            }
          }
          onDone(fullText);
          return;
        } catch (error) {
          if (attempts < maxAttempts - 1) { rotateKey(); attempts++; }
          else {
            console.error('All keys exhausted:', error);
            onError(`⚠️ **Error:** ${error.message}\n\nPlease try again.`);
            return;
          }
        }
      }
      onError('⚠️ All API keys exhausted. Please try again later.');
    }

              'Authorization': `Bearer ${GROQ_API_KEY}`
            },

    async function extractPdfText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            if (typeof pdfjsLib === 'undefined') {
              resolve({ text: `[PDF uploaded: ${file.name} — ${(file.size/1024).toFixed(1)} KB. PDF.js not loaded.]`, pages: 0 });
              return;
            }
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const typedArray = new Uint8Array(e.target.result);
            const pdf = await pdfjsLib.getDocument({ data: typedArray }).promise;
            const numPages = pdf.numPages;
            let fullText = '';
            for (let i = 1; i <= numPages; i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              const pageText = content.items.map(item => item.str).join(' ');
              fullText += `\n--- Page ${i} ---\n${pageText}`;
            }
            resolve({ text: fullText.trim(), pages: numPages });
          } catch (err) {
            resolve({ text: `[PDF uploaded: ${file.name} — could not extract text: ${err.message}]`, pages: 0 });
          }
        };
        reader.onerror = () => reject(new Error('FileReader error'));
        reader.readAsArrayBuffer(file);
      });
    }

        return { type: 'meeting', suggestions: ['⏰ Set reminder', '📋 Summarize now', '📌 Pin for quick access'] };
      } else if (lower.includes('interview') || lower.includes('resume') || lower.includes('cv')) {
        return { type: 'interview', suggestions: ['🎤 Interview mode', '📌 Pin for quick access', '📋 Summarize now'] };
      } else if (lower.includes('report') || lower.includes('abt') || lower.includes('data')) {
        return { type: 'report', suggestions: ['📋 Summarize now', '📌 Pin for quick access', '📊 Analyze data'] };
      } else {
        return { type: 'general', suggestions: ['📋 Summarize now', '📌 Pin for quick access'] };
      }
    }

    // ── File Memory ───────────────────────────────────────────
    function getFileMemory() {
      return JSON.parse(localStorage.getItem('aria_file_memory') || '[]');
    }
    function saveFileMemory(files) {
      localStorage.setItem('aria_file_memory', JSON.stringify(files));
    }
    function addToFileMemory(name, content, pageCount, wordCount) {
      const files = getFileMemory();
      const id = Date.now().toString();
      files.unshift({
        id,
        name,
        content: content.slice(0, 40000),
        uploadDate: new Date().toLocaleString('en-IN'),
        pageCount: pageCount || 0,
        wordCount: wordCount || 0,
        tags: []
      });
      // Keep only last 20 files
      if (files.length > 20) files.splice(20);
      saveFileMemory(files);
      return id;
    }
    function loadFileFromMemory(fileId) {
      const files = getFileMemory();
      const f = files.find(x => x.id === fileId);
      if (f) {
        state.uploadedFileName = f.name;
        state.uploadedFileContent = f.content;
        state.uploadedFilePageCount = f.pageCount;
        state.uploadedFileWordCount = f.wordCount;
        render();
      }
    }
    function deleteFileFromMemory(fileId) {
      const files = getFileMemory().filter(f => f.id !== fileId);
      saveFileMemory(files);
      render();
    }

    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      // Show loading state
      state.uploadedFileName = file.name + ' (loading...)';
      state.uploadedFileContent = null;
      state.uploadedFilePageCount = null;
      state.uploadedFileWordCount = null;
      state.fileSuggestion = null;
      render();

      let extractedText = '';
      let pageCount = 0;

      if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
        // PDF extraction via PDF.js
        const result = await extractPdfText(file);
        extractedText = result.text;
        pageCount = result.pages;
      } else if (file.type === 'text/plain' || file.name.endsWith('.csv') || file.name.endsWith('.txt')) {
        // Plain text / CSV
        extractedText = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsText(file);
        });
        pageCount = 1;
      } else if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
        // Excel: read as text (basic extraction)
        extractedText = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            // Try to extract readable text from binary
            const raw = e.target.result;
            const text = raw.replace(/[^\x20-\x7E\n\r\t]/g, ' ').replace(/\s{3,}/g, '\n').trim();
            resolve(`[Excel file: ${file.name}]\n${text.slice(0, 6000)}`);
          };
          reader.readAsText(file, 'utf-8');
        });
        pageCount = 1;
      } else if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) {
        // Word: extract readable text
        extractedText = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const raw = e.target.result;
            // Extract readable ASCII text from binary
            const text = raw.replace(/[^\x20-\x7E\n\r\t]/g, ' ').replace(/\s{3,}/g, '\n').trim();
            resolve(`[Word document: ${file.name}]\n${text.slice(0, 6000)}`);
          };
          reader.readAsBinaryString(file);
        });
        pageCount = 1;
      } else {
        extractedText = `[File uploaded: ${file.name} — ${(file.size/1024).toFixed(1)} KB. File type not supported for text extraction.]`;
        pageCount = 0;
      }

      const wordCount = extractedText.split(/\s+/).filter(Boolean).length;
      const truncated = extractedText.slice(0, 40000); // ~30-40 pages worth

      state.uploadedFileName = file.name;
      state.uploadedFileContent = truncated;
      state.uploadedFilePageCount = pageCount;
      state.uploadedFileWordCount = wordCount;

      // Save to persistent active context — stays for all questions in this chat
      state.activeFileContext = {
        name: file.name,
        content: truncated,
        pageCount,
        wordCount
      };

      // Save to file memory
      addToFileMemory(file.name, truncated, pageCount, wordCount);

      // Smart file suggestion
      const suggestionData = detectFileSuggestions(file.name);
      state.fileSuggestion = {
        show: true,
        fileName: file.name,
        type: suggestionData.type,
        suggestions: suggestionData.suggestions
      };

      render();
    }

    // ── Web Search Fallback (DuckDuckGo Instant Answer API) ───
    async function searchWeb(query) {
      try {
        const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
        const response = await fetch(url);
        if (!response.ok) return null;
        const data = await response.json();
        let result = '';
        if (data.AbstractText) result += data.AbstractText;
        if (data.Answer) result += (result ? '\n' : '') + data.Answer;
        if (data.RelatedTopics && data.RelatedTopics.length > 0) {
          const topics = data.RelatedTopics.slice(0, 3).map(t => t.Text || '').filter(Boolean);
          if (topics.length > 0) result += (result ? '\n\nRelated: ' : 'Related: ') + topics.join(' | ');
        }
        return result || null;
      } catch (e) {
        return null;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      // Build final content — if file just uploaded, mention it in the message
      let finalContent = content;
      if (state.uploadedFileContent) {
        // First message with this file — mention it
        finalContent = (content ? content : 'Please analyze this uploaded file and be ready to answer questions about it.');
        // Clear pending upload state (activeFileContext already set)
        state.uploadedFileContent = null;
        state.uploadedFileName = null;
        state.uploadedFilePageCount = null;
        state.uploadedFileWordCount = null;
        state.fileSuggestion = null;
      }

      if (!finalContent.trim()) return;
      detectAndSetReminder(finalContent);

      const processedContent = processSlashCommand(finalContent);

      // ✅ FEATURE 2: Add timestamp to message
      const userMessage = { id: Date.now(), role: 'user', content: processedContent, timestamp: Date.now() };
      state.messages.push(userMessage);
      state.isTyping = true;
      state.isStreaming = false;
      input.value = '';
      state.currentInput = '';
      
      // Close keyboard on mobile
      input.blur();
      
      render();
      
      // Scroll to bottom after render
      setTimeout(() => {
        const area = document.getElementById('messagesArea');
        if (area) {
          area.scrollTop = area.scrollHeight;
          area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }
      }, 100);

      // Streaming AI response
      const aiMsgId = Date.now() + 1;
      // ✅ FEATURE 2: Add timestamp to AI message
      const aiMessage = { id: aiMsgId, role: 'assistant', content: '', timestamp: Date.now() };
      state.messages.push(aiMessage);
      state.isTyping = false;
      state.isStreaming = true;
      render();
      
      // Scroll to bottom again after AI message added
      setTimeout(() => {
        const area = document.getElementById('messagesArea');
        if (area) {
          area.scrollTop = area.scrollHeight;
          area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }
      }, 150);

      await generateResponseStreaming(
        processedContent,
        (partial) => {
          const idx = state.messages.findIndex(m => m.id === aiMsgId);
          if (idx !== -1) { state.messages[idx].content = partial; }
          // Update streaming message in DOM without full re-render
          const streamEl = document.getElementById('streaming-msg-' + aiMsgId);
          if (streamEl) {
            streamEl.innerHTML = formatMarkdown(partial);
          }
          const area = document.getElementById('messagesArea');
          if (area) {
            area.scrollTop = area.scrollHeight;
          }
        },
        (full) => {
          const idx = state.messages.findIndex(m => m.id === aiMsgId);
          if (idx !== -1) { state.messages[idx].content = full; }
          state.isStreaming = false;

          // Check for [SEARCH_NEEDED: query] pattern
          const searchMatch = full.match(/\[SEARCH_NEEDED:\s*([^\]]+)\]/i);
          if (searchMatch) {
            const searchQuery = searchMatch[1].trim();
            const msgIdx = state.messages.findIndex(m => m.id === aiMsgId);
            if (msgIdx !== -1) {
              state.messages[msgIdx].content = full.replace(/\[SEARCH_NEEDED:[^\]]+\]/gi, '').trim() + '\n\n⏳ *Searching the web...*';
              state.messages[msgIdx].webSearchUsed = true;
            }
            render();
            setTimeout(() => {
              const area = document.getElementById('messagesArea');
              if (area) area.scrollTop = area.scrollHeight;
            }, 100);
            searchWeb(searchQuery).then(webResult => {
              const mIdx = state.messages.findIndex(m => m.id === aiMsgId);
              if (mIdx !== -1) {
                const baseContent = full.replace(/\[SEARCH_NEEDED:[^\]]+\]/gi, '').trim();
                if (webResult) {
                  state.messages[mIdx].content = baseContent + `\n\n---\n🌐 **Web Search Result for "${searchQuery}":**\n${webResult}`;
                } else {
                  state.messages[mIdx].content = baseContent + `\n\n*Web search returned no results for "${searchQuery}".*`;
                }
                state.messages[mIdx].webSearchUsed = true;
              }
              saveCurrentChat();
              playChime();
              render();
              setTimeout(() => {
                mermaid.run();
                const area = document.getElementById('messagesArea');
                if (area) area.scrollTop = area.scrollHeight;
              }, 100);
            });
          } else {
            saveCurrentChat();
            playChime();
            render();
            setTimeout(() => { 
              mermaid.run();
              const area = document.getElementById('messagesArea');
              if (area) area.scrollTop = area.scrollHeight;
            }, 100);
          }
        },
        (errMsg) => {
          const idx = state.messages.findIndex(m => m.id === aiMsgId);
          if (idx !== -1) { state.messages[idx].content = errMsg; }
          state.isStreaming = false;
          render();
          setTimeout(() => {
            const area = document.getElementById('messagesArea');
            if (area) area.scrollTop = area.scrollHeight;
          }, 100);
        }
      );
    }

          lastMsg.content += '\n\n*[Generation stopped by user]*';
          lastMsg.stopped = true;
        }
      }
      
      saveCurrentChat();
      render();
    }

    // ✅ FEATURE 7: Conversation Branching
    function branchConversation(msgId) {
      const msgIndex = state.messages.findIndex(m => m.id === msgId);
      if (msgIndex === -1) return;
      
      // Create new branch - keep messages up to this point
      const branchedMessages = state.messages.slice(0, msgIndex + 1);
      
      // Save current chat
      saveCurrentChat();
      
      // Create new chat with branched messages
      state.messages = [...branchedMessages];
      state.currentChatId = null; // New chat
      
      // Add branch indicator
      if (state.messages.length > 0) {
        const lastMsg = state.messages[state.messages.length - 1];
        lastMsg.branched = true;
        lastMsg.branchedAt = Date.now();
      }
      
      render();
      
      // Show notification
      setTimeout(() => {
        alert('🌳 New conversation branch created! You can now explore a different direction.');
      }, 300);
    }

    // ✅ FEATURE 9: Text-to-Speech (Voice Output)
    let currentSpeech = null;
    function speakMessage(text) {
      if (!('speechSynthesis' in window)) {
        alert('Text-to-speech not supported in this browser.');
        return;
      }
      
      // Stop current speech if playing
      if (currentSpeech) {
        speechSynthesis.cancel();
        currentSpeech = null;
        return;
      }
      
      // Clean markdown from text
      const cleanText = text
        .replace(/```[\s\S]*?```/g, 'code block')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/\*\*([^*]+)\*\*/g, '$1')
        .replace(/\*([^*]+)\*/g, '$1')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/#+ /g, '')
        .trim();
      
      currentSpeech = new SpeechSynthesisUtterance(cleanText);
      currentSpeech.rate = 1.0;
      currentSpeech.pitch = 1.0;
      currentSpeech.volume = 1.0;
      currentSpeech.lang = 'en-IN';
      
      currentSpeech.onend = () => {
        currentSpeech = null;
      };
      
      speechSynthesis.speak(currentSpeech);
    }

    // ✅ FEATURE 10: Pull to Refresh (Mobile)
    let pullStartY = 0;
    let pullDistance = 0;
    let isPulling = false;

    function handleTouchStart(e) {
      const messagesArea = document.getElementById('messagesArea');
      if (messagesArea && messagesArea.scrollTop === 0) {
        pullStartY = e.touches[0].clientY;
        isPulling = true;
      }
    }

    function handleTouchMove(e) {
      if (!isPulling) return;
      
      pullDistance = e.touches[0].clientY - pullStartY;
      
      if (pullDistance > 0 && pullDistance < 100) {
        e.preventDefault();
        const messagesArea = document.getElementById('messagesArea');
        if (messagesArea) {
          messagesArea.style.transform = `translateY(${pullDistance * 0.5}px)`;
        }
      }
    }

    function handleTouchEnd() {
      if (!isPulling) return;
      
      const messagesArea = document.getElementById('messagesArea');
      if (messagesArea) {
        messagesArea.style.transform = '';
      }
      
      if (pullDistance > 80) {
        // Trigger new chat
        newChat();
      }
      
      isPulling = false;
      pullDistance = 0;
    }

    function searchConversation(query) {
      state.searchQuery = query;
      
      if (!query.trim()) {
        state.searchResults = [];
        render();
        return;
      }
      
      const results = [];
      const lowerQuery = query.toLowerCase();
      
      state.messages.forEach((msg, index) => {
        if (msg.content.toLowerCase().includes(lowerQuery)) {
          results.push({
            msgId: msg.id,

    // Plugin: Web Search (Enhanced)
    async function performWebSearch(query) {
      try {
        // Using DuckDuckGo Instant Answer API
        const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`;
        const response = await fetch(url);
        const data = await response.json();
        
        let result = '🌐 **Web Search Results:**\n\n';
        
        if (data.AbstractText) {
          result += `**${data.Heading}**\n${data.AbstractText}\n\n`;
        }
        
        if (data.RelatedTopics && data.RelatedTopics.length > 0) {
          result += '**Related Topics:**\n';
          data.RelatedTopics.slice(0, 5).forEach(topic => {
            if (topic.Text) {
              result += `• ${topic.Text}\n`;
            }
          });
        }
        
        return result || '❌ No results found';
      } catch (e) {
        return '❌ Web search failed: ' + e.message;
      }
    }

      try {
        // Using wttr.in - Free weather API
        const response = await fetch(`https://wttr.in/${encodeURIComponent(location)}?format=j1`);
        const data = await response.json();
        
        const current = data.current_condition[0];
        return `🌤️ **Weather in ${location}:**\n\n` +
               `Temperature: ${current.temp_C}°C (${current.temp_F}°F)\n` +
               `Condition: ${current.weatherDesc[0].value}\n` +
               `Humidity: ${current.humidity}%\n` +
               `Wind: ${current.windspeedKmph} km/h`;
      } catch (e) {
        return '❌ Weather data unavailable';
      }
    }

    // Auto-detect and execute plugins
    async function processPlugins(userMessage) {
      let pluginResponse = '';
      
      // Calculator plugin
      if (state.activePlugins.includes('calculator')) {
        const calcMatch = userMessage.match(/calculate|compute|what is|solve/i);
        const mathMatch = userMessage.match(/[\d+\-*/().\s]+/);
        if (calcMatch && mathMatch) {
          pluginResponse += calculateExpression(mathMatch[0].trim()) + '\n\n';
        }
      }
      
      // Web search plugin
      if (state.activePlugins.includes('websearch')) {
        const searchMatch = userMessage.match(/search for|look up|find information about/i);
        if (searchMatch) {
          const query = userMessage.replace(searchMatch[0], '').trim();
          pluginResponse += await performWebSearch(query) + '\n\n';
        }
      }
      
      // Weather plugin
      if (state.activePlugins.includes('weather')) {
        const weatherMatch = userMessage.match(/weather in|temperature in|forecast for/i);
        if (weatherMatch) {
          const location = userMessage.replace(weatherMatch[0], '').trim().replace(/[?.!]/g, '');
          pluginResponse += await getWeather(location) + '\n\n';
        }
      }
      
      return pluginResponse;
    }

      recognition.onresult = (e) => {

          .map(result => result[0])

          .join('');
        
        const input = document.getElementById('messageInput');

    function requestNotificationPermission(cb) {
      if (!('Notification' in window)) { alert('Notifications not supported in this browser.'); return; }
      if (Notification.permission === 'granted') { cb && cb(); return; }
      Notification.requestPermission().then(p => { if (p === 'granted' && cb) cb(); });

    function scheduleReminder(text, timeMs, fileId) {
      requestNotificationPermission(() => {
        setTimeout(() => {
          const body = fileId ? `⏰ Reminder: Review file now — ${text}` : text;
          const notif = new Notification('⏰ QUANTUM AI Reminder', { body, icon: '' });
          if (fileId) {
            notif.onclick = () => { loadFileFromMemory(fileId); window.focus(); };
          }
          playChime();
        }, timeMs);
      });
    }

    function addReminder(text, timeStr, fileId) {
      if (!text || !timeStr) return;
      const now = new Date();
      const [h, m] = timeStr.split(':').map(Number);
      const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      const diff = target - now;
      const reminders = getReminders();
      const entry = { text, time: timeStr, scheduled: target.toISOString() };
      if (fileId) entry.fileId = fileId;
      reminders.push(entry);
      saveReminders(reminders);
      scheduleReminder(text, diff, fileId);
      render();
    }

    // Natural language reminder detection
    function detectAndSetReminder(text) {
      const lower = text.toLowerCase();
      const match = lower.match(/remind\s+me\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s+(?:about\s+)?(.+)/i);
      if (!match) return;
      let hour = parseInt(match[1]);
      const min = parseInt(match[2] || '0');
      const ampm = match[3];
      const about = match[4] ? match[4].replace(/[.!?].*/, '').trim() : 'your reminder';
      if (ampm === 'pm' && hour < 12) hour += 12;
      if (ampm === 'am' && hour === 12) hour = 0;
      const timeStr = `${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
      addReminder(about, timeStr);
    }

                                </button>
                              </div>
                            ` : `
                              <!-- ✅ FEATURE 4: Edit Button for User Messages -->
                              ${!isEditing ? `

                                  ${icons.edit}
                                </button>
                                <button onclick="copyMessage('${safeContent}')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-400 hover:text-gray-600 text-xs flex items-center gap-1">
                                  ${icons.copy}
                                </button>
                                <!-- ✅ FEATURE 7: Branch from user message -->
                                <button onclick="branchConversation(${msg.id})" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-400 hover:text-gray-600 text-xs flex items-center gap-1" title="Branch from here">
                                  ${icons.branch}
                                </button>
                              ` : ''}
                            `}
                          </div>

                          <div class="w-8 h-8 rounded-full gradient-blue flex items-center justify-center flex-shrink-0 text-white text-xs font-bold">V</div>
                        ` : ''}
                      </div>`;
                    }).join('')}
                    
                    <!-- ✅ FEATURE 1: Enhanced Typing Indicator -->
                    ${state.isTyping ? `
                      <div class="flex gap-3 mb-5">
                        <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center">${quantumLogoSVG}</div>
                        <div class="typing-indicator">
                          <span></span>
                          <span></span>
                          <span></span>
                        </div>
                      </div>
                    ` : ''}
                  </div>
                `}
              </div>

              <!-- Input Area -->
              <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2 sm:px-4 py-2 sm:py-3 flex-shrink-0" style="padding-bottom: max(12px, env(safe-area-inset-bottom)); padding-bottom: max(12px, calc(env(safe-area-inset-bottom) + 4px))">

                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-500"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    <span class="text-xs text-orange-700 dark:text-orange-300 flex-1 truncate">${state.uploadedFileName}${state.uploadedFilePageCount ? ` · ${state.uploadedFilePageCount} pages` : ''}${state.uploadedFileWordCount ? ` · ~${state.uploadedFileWordCount} words` : ''}</span>
                    <button onclick="removeFile()" class="text-orange-400 hover:text-red-500 text-xs">✕</button>
                  </div>
                  ${state.fileSuggestion && state.fileSuggestion.show ? `
                    <div class="mb-2 px-3 py-2 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg animate-fade-in-up">
                      <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                          <p class="text-xs font-semibold text-blue-700 dark:text-blue-300 mb-1">📄 ${state.fileSuggestion.fileName.length > 40 ? state.fileSuggestion.fileName.slice(0,40)+'…' : state.fileSuggestion.fileName} uploaded!</p>
                          <p class="text-xs text-blue-600 dark:text-blue-400 mb-2">💡 QUANTUM AI suggests: What would you like to do?</p>
                          <div class="flex flex-wrap gap-1">
                            ${state.fileSuggestion.suggestions.map(s => `
                              <button onclick="handleFileSuggestionAction('${s}')" class="px-2 py-1 bg-white dark:bg-gray-800 border border-blue-200 dark:border-blue-700 rounded text-xs text-blue-700 dark:text-blue-300 hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-colors">${s}</button>
                            `).join('')}
                          </div>
                        </div>
                        <button onclick="dismissFileSuggestion()" class="text-blue-400 hover:text-blue-600 text-xs flex-shrink-0">✕</button>
                      </div>
                    </div>
                  ` : ''}
                ` : ''}

                <div class="flex items-end gap-1 sm:gap-2">
                  <!-- File Upload -->
                  <label class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center cursor-pointer flex-shrink-0 transition-colors" title="Upload File">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <input type="file" class="hidden" accept=".txt,.csv,.pdf,.doc,.docx,.xls,.xlsx" onchange="handleFileUpload(event)">
                  </label>

                  <!-- Voice Input -->
                  <button onclick="startVoiceInput()" class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg flex items-center justify-center flex-shrink-0 transition-colors ${state.isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700'}" title="${state.isRecording ? 'Stop Recording' : 'Voice Input'}">
                    ${icons.mic}
                  </button>

                  <!-- Text Input -->
                  <div class="flex-1 bg-gray-50 dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 focus-within:border-orange-300 focus-within:bg-white dark:focus-within:bg-gray-900 transition-all">
                    <textarea id="messageInput" oninput="state.currentInput = this.value; handleSlashHint(this);" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                      placeholder="Ask QUANTUM AI anything... (Shift+Enter for new line${state.settings.slashCommands ? ' · /letter /report /abt /do' : ''})"
                      class="w-full bg-transparent px-3 sm:px-4 py-2 outline-none resize-none min-h-[38px] max-h-[120px] dark:text-gray-200 dark:placeholder-gray-500 text-sm sm:text-base ${getFontSizeClass()}" rows="1"></textarea>
                  </div>

                  <!-- ✅ FEATURE 5: Send / Stop Button -->
                  ${state.isStreaming ? `
                    <button onclick="stopGeneration()" class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg bg-red-500 hover:bg-red-600 flex items-center justify-center flex-shrink-0 text-white transition-all" title="Stop generating">
                      ${icons.stop}
                    </button>
                  ` : `
                    <button onclick="sendMessage()" class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg gradient-orange hover:opacity-90 flex items-center justify-center flex-shrink-0 text-white transition-all">
                      ${icons.send}
                    </button>
                  `}
                </div>

                <p class="text-center text-xs text-gray-300 dark:text-gray-700 mt-2 hidden sm:block">
                  QUANTUM AI — Personal Assistant for <strong>Velmurugan Sir, DGM – CS Division, NLCIL</strong> &nbsp;|&nbsp; Built by <strong>Mohanraj</strong>, Cybersecurity Professional
                </p>
                <p class="text-center text-xs text-gray-400 dark:text-gray-600 mt-1 sm:hidden">
                  QUANTUM AI — Personal Assistant
                </p>
              </div>
            </div>
          </div>

          <!-- Templates Modal -->
          ${state.showTemplates ? `
            <div class="modal-backdrop">
              <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">📋 NLCIL Quick Templates</h2>
                  <button onclick="state.showTemplates = false; render();" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">${icons.x}</button>
                </div>
                <div class="p-4 grid grid-cols-2 gap-3">
                  ${[
                    { icon: '📄', name: 'Official Letter', prompt: 'Draft an official letter from DGM CS Division, NLCIL regarding: ' },
                    { icon: '📝', name: 'DO Letter', prompt: 'Draft a Demi-Official (DO) letter from Velmurugan, DGM CS Division, NLCIL to: ' },
                    { icon: '📊', name: 'Meeting Minutes', prompt: 'Prepare meeting minutes for a CS Division meeting at NLCIL. Agenda: ' },
                    { icon: '📋', name: 'Technical Report', prompt: 'Generate a technical report for NLCIL CS Division on: ' },
                    { icon: '⚡', name: 'ABT Report Summary', prompt: 'Generate an ABT (Availability Based Tariff) report summary for NLCIL Thermal Power Station. Include generation data, deviation, and recommendations.' },
                    { icon: '🔒', name: 'Cybersecurity Advisory', prompt: 'Draft a cybersecurity advisory notice for NLCIL employees regarding: ' },
                    { icon: '📈', name: 'Performance Report', prompt: 'Create a performance report for NLCIL CS Division covering: ' },
                    { icon: '🛠️', name: 'Maintenance Note', prompt: 'Draft a maintenance work order / technical note for NLCIL regarding: ' }
                  ].map(t => `
                    <button onclick="document.getElementById('messageInput').value = \`${t.prompt}\`; state.showTemplates = false; render(); document.getElementById('messageInput').focus();"
                      class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-900 hover:bg-orange-50 dark:hover:bg-orange-900/10 hover:border-orange-300 rounded-lg border border-gray-200 dark:border-gray-700 transition-all text-left">
                      <span class="text-xl">${t.icon}</span>
                      <span class="text-sm font-medium text-gray-800 dark:text-gray-100">${t.name}</span>
                    </button>
                  `).join('')}
                </div>
              </div>
            </div>
          ` : ''}

          <!-- Notes Modal -->
          ${state.showNotes ? `
            <div class="modal-backdrop" onclick="if(event.target===this){state.showNotes=false;render();}">
              <div class="w-full max-w-lg bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">📝 Quick Notes</h2>
                  <button onclick="state.showNotes=false;render();" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">${icons.x}</button>
                </div>
                <div class="p-4">
                  <textarea id="notesTextarea" oninput="onNotesInput(this.value)"
                    class="w-full h-64 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm text-gray-800 dark:text-gray-200 outline-none resize-none focus:border-orange-300"
                    placeholder="Jot down your notes here... Auto-saved as you type.">${getNotes()}</textarea>
                  <p class="text-xs text-gray-400 dark:text-gray-600 mt-2">💾 Auto-saved to local storage</p>
                </div>
              </div>
            </div>
          ` : ''}

          <!-- Reminders Modal -->
          ${state.showReminderModal ? `
            <div class="modal-backdrop" onclick="if(event.target===this){state.showReminderModal=false;render();}">
              <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">⏰ Reminders</h2>
                  <button onclick="state.showReminderModal=false;render();" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">${icons.x}</button>
                </div>
                <div class="p-4 space-y-4">
                  <div class="flex gap-2">
                    <input id="reminderText" type="text" placeholder="Reminder text..." class="flex-1 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-800 dark:text-gray-200 outline-none focus:border-orange-300">
                    <input id="reminderTime" type="time" class="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-800 dark:text-gray-200 outline-none focus:border-orange-300">
                    <button onclick="addReminder(document.getElementById('reminderText').value, document.getElementById('reminderTime').value); document.getElementById('reminderText').value='';"
                      class="px-3 py-2 gradient-orange text-white rounded-lg text-sm font-medium hover:opacity-90">Add</button>
                  </div>
                  <div class="space-y-2 max-h-48 overflow-y-auto">
                    ${getReminders().length === 0 ? `<p class="text-xs text-gray-400 dark:text-gray-600 text-center py-4">No reminders set. Add one above or say "remind me at 3pm about meeting" in chat.</p>` :
                      getReminders().map((r, i) => `
                        <div class="flex items-center gap-2 p-2 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg">
                          <span class="text-base">⏰</span>
                          <div class="flex-1 min-w-0">
                            <p class="text-sm text-gray-800 dark:text-gray-200 truncate">${r.text}</p>
                            <p class="text-xs text-gray-400 dark:text-gray-500">${r.time}</p>
                          </div>
                          <button onclick="deleteReminder(${i})" class="text-red-400 hover:text-red-600 text-xs">✕</button>
                        </div>
                      `).join('')}
                  </div>
                  <p class="text-xs text-gray-400 dark:text-gray-600">💡 Tip: Type "remind me at 3pm about meeting" in chat to auto-set reminders.</p>
                </div>
              </div>
            </div>
          ` : ''}

          <!-- Summary Modal -->
          ${state.showSummary ? `
            <div class="modal-backdrop" onclick="if(event.target===this){state.showSummary=false;render();}">
              <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">📊 Conversation Summary</h2>
                  <button onclick="state.showSummary=false;render();" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">${icons.x}</button>
                </div>
                <div class="p-5 max-h-[70vh] overflow-y-auto">
                  <div class="markdown-content text-gray-800 dark:text-gray-200 text-sm">${formatMarkdown(state.summaryContent)}</div>
                </div>
              </div>
            </div>
          ` : ''}

          ${state.showPinnedModal ? `
            <div class="modal-backdrop" onclick="if(event.target===this){state.showPinnedModal=false;render();}">
              <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">📌 Pinned Message</h2>
                  <button onclick="state.showPinnedModal=false;render();" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">${icons.x}</button>
                </div>
                <div class="p-5 max-h-[70vh] overflow-y-auto">
                  <div class="markdown-content text-gray-800 dark:text-gray-200 text-sm">${formatMarkdown(state.pinnedModalContent)}</div>
                </div>
              </div>
            </div>
          ` : ''}
          <!-- Settings Modal -->
          ${state.showSettings ? `
            <div class="modal-backdrop" onclick="if(event.target===this){state.showSettings=false;render();}">
              <div class="w-full max-w-lg bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">⚙️ QUANTUM AI Settings</h2>
                  <button onclick="state.showSettings=false;render();" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">${icons.x}</button>
                </div>
                <div class="p-5 space-y-5 max-h-[70vh] overflow-y-auto">

                  <!-- Language -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">🌐 Response Language</label>
                    <div class="flex gap-2">
                      ${['english','tamil'].map(lang => `
                        <button onclick="toggleSetting('language','${lang}')"
                          class="flex-1 py-2 rounded-lg border text-sm font-medium transition-all ${state.settings.language===lang ? 'bg-orange-500 text-white border-orange-500' : 'border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:border-orange-300'}">
                          ${lang === 'english' ? '🇬🇧 English' : '🇮🇳 Tamil'}
                        </button>
                      `).join('')}
                    </div>
                  </div>

                  <!-- Font Size -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">🎨 Font Size</label>
                    <div class="flex gap-2">
                      ${[['small','A−'],['medium','A'],['large','A+']].map(([size,label]) => `
                        <button onclick="toggleSetting('fontSize','${size}')"
                          class="flex-1 py-2 rounded-lg border text-sm font-medium transition-all ${state.settings.fontSize===size ? 'bg-orange-500 text-white border-orange-500' : 'border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:border-orange-300'}">
                          ${label}
                        </button>
                      `).join('')}
                    </div>
                  </div>

                  <!-- Response Format -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">📋 Response Format</label>
                    <div class="flex gap-2">
                      ${[['formal','📄 Formal'],['bullets','• Bullets'],['summary','📝 Summary']].map(([fmt,label]) => `
                        <button onclick="toggleSetting('responseFormat','${fmt}')"
                          class="flex-1 py-2 rounded-lg border text-xs font-medium transition-all ${state.settings.responseFormat===fmt ? 'bg-orange-500 text-white border-orange-500' : 'border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:border-orange-300'}">
                          ${label}
                        </button>
                      `).join('')}
                    </div>
                  </div>

                  <!-- Toggles -->
                  <div class="space-y-3">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">🚀 Features</label>

                    ${[
                      ['notificationSound', '🔔 Notification Sound', 'Play chime when ARIA responds'],
                      ['wordCount', '📊 Word Count & Reading Time', 'Show word count below each response'],
                      ['slashCommands', '⌨️ Slash Commands', '/letter /report /abt /do /translate'],
                      ['hideWelcomeOnMobile', '📱 Hide Welcome on Mobile', 'Show chat directly on mobile devices']
                    ].map(([key, title, desc]) => `
                      <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-900 rounded-lg">
                        <div>
                          <p class="text-sm font-medium text-gray-700 dark:text-gray-300">${title}</p>
                          <p class="text-xs text-gray-400 dark:text-gray-500">${desc}</p>
                        </div>
                        <button onclick="toggleSetting('${key}', ${!state.settings[key]})"
                          class="relative w-11 h-6 rounded-full transition-colors ${state.settings[key] ? 'bg-orange-500' : 'bg-gray-300 dark:bg-gray-600'}">
                          <span class="absolute top-0.5 ${state.settings[key] ? 'left-5' : 'left-0.5'} w-5 h-5 bg-white rounded-full shadow transition-all"></span>
                        </button>
                      </div>
                    `).join('')}
                  </div>

                  <!-- 🆕 FEATURE 20: Plugin Manager -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">🔌 Active Plugins</label>
                    <div class="space-y-2">
                      ${[
                        ['websearch', '🌐 Web Search', 'Search the internet for information'],
                        ['calculator', '🧮 Calculator', 'Solve math expressions'],
                        ['weather', '🌤️ Weather', 'Get weather information']
                      ].map(([plugin, title, desc]) => `
                        <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700">
                          <div>
                            <p class="text-sm font-medium text-gray-700 dark:text-gray-300">${title}</p>
                            <p class="text-xs text-gray-400 dark:text-gray-500">${desc}</p>
                          </div>
                          <button onclick="togglePlugin('${plugin}')"
                            class="relative w-11 h-6 rounded-full transition-colors ${state.activePlugins.includes('${plugin}') ? 'bg-green-500' : 'bg-gray-300 dark:bg-gray-600'}">
                            <span class="absolute top-0.5 ${state.activePlugins.includes('${plugin}') ? 'left-5' : 'left-0.5'} w-5 h-5 bg-white rounded-full shadow transition-all"></span>
                          </button>
                        </div>
                      `).join('')}
                    </div>
                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">💡 Plugins are automatically triggered based on your message content.</p>
                  </div>

                  <!-- Slash Commands Reference -->
                  ${state.settings.slashCommands ? `
                    <div class="bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800 rounded-lg p-3">
                      <p class="text-xs font-semibold text-orange-700 dark:text-orange-300 mb-2">⌨️ Available Slash Commands:</p>
                      <div class="grid grid-cols-2 gap-1">
                        ${['/letter','/report','/minutes','/advisory','/abt','/do','/translate','/summarize','/explain','/debug'].map(cmd => `
                          <code class="text-xs bg-white dark:bg-gray-800 px-2 py-1 rounded border border-orange-200 dark:border-orange-700 text-orange-600 dark:text-orange-400">${cmd}</code>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}

                </div>
              </div>
            </div>
          ` : ''}
        </div>
      `;

      // Scroll to bottom
      const area = document.getElementById('messagesArea');
      if (area) setTimeout(() => area.scrollTop = area.scrollHeight, 50);

      // Don't auto-focus on mobile to prevent keyboard from staying open
      // Only focus on desktop
      if (window.innerWidth > 640) {
        setTimeout(() => {
          const inp = document.getElementById('messageInput');
          if (inp) inp.focus();
        }, 60);
      }
    }

    // ── Slash Command Hint ────────────────────────────────────
    function handleSlashHint(textarea) {
      state.currentInput = textarea.value;
      // Auto-resize textarea
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }

    // ── Interview Mode ────────────────────────────────────────
    function launchInterviewMode() {
      const w = 380, h = 520;
      const left = window.screen.width - w - 20;
      const top = window.screen.height - h - 60;

      const interviewUrl = 'interview.html?k=' + encodeURIComponent(GROQ_API_KEY) + '&m=' + encodeURIComponent(GROQ_MODEL);

      const popup = window.open(interviewUrl, 'QUANTUM_AI_Interview',
        `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`
      );

      if (!popup) {
        alert('Popup blocked! Please allow popups for this site and try again.');
      }
    }

    // Initial render
    render();

    // Auto-dismiss daily briefing after 8 seconds
    setTimeout(() => {
      if (!sessionStorage.getItem('aria_briefing_dismissed')) {
        dismissBriefing();
      }
    }, 8000);
  </script>
</body>
